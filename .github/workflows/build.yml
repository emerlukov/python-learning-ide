name: Build APK

# ДОБАВЛЯЕМ ПРАВА ДЛЯ СОЗДАНИЯ РЕЛИЗА
permissions:
  contents: write

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v3
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev automake \
            autopoint gettext libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Clean previous build
        run: |
          rm -rf .buildozer bin
          buildozer -v android clean || true

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          
          if [ $? -ne 0 ]; then
            echo "❌ Buildozer failed! Last 50 lines:"
            tail -50 build.log
            exit 1
          fi
          
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK built successfully!"
            ls -la bin/
          else
            echo "❌ No APK found in bin/ directory!"
            exit 1
          fi
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Python-Learning-IDE-APK-${{ github.ref_name }}
          path: bin/*.apk
          retention-days: 7

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
