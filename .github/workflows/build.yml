name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer + Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Clean previous builds
        run: |
          rm -rf \~/.buildozer .buildozer
          buildozer -v android clean || true

      - name: Build APK
        run: |
          buildozer -v android debug
        env:
          P4A_DEBUG: "true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Learning-IDE-APK
          path: bin/*.apk
          if-no-files-found: warn
