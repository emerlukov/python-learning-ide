name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip python3-dev build-essential git autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
          cmake libffi-dev libssl-dev openjdk-17-jdk zip unzip

    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel
        pip install cython buildozer

    - name: Show environment
      run: |
        echo "Python version:"
        python3 --version
        echo "Directory contents:"
        ls -la
        echo "Main.py exists:"
        test -f main.py && echo "YES" || echo "NO"

    - name: Build APK with full log
      run: |
        buildozer android debug 2>&1 | tee full_build.log
        echo "BUILD_EXIT_CODE=$?" >> $GITHUB_ENV

    - name: Find APK files
      if: always()
      run: |
        echo "=== ALL APK FILES ==="
        find / -name "*.apk" 2>/dev/null | head -20
        echo "=== BIN DIRECTORY ==="
        ls -la bin/ 2>/dev/null || echo "No bin/ directory"
        echo "=== BUILDOZER OUTPUT ==="
        find .buildozer -name "*.apk" 2>/dev/null || echo "No APK in .buildozer"

    - name: Upload full log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: full-build-log
        path: full_build.log

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          bin/*.apk
          .buildozer/**/*.apk
          *.apk