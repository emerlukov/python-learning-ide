name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Clean builds
        run: |
          rm -rf \~/.buildozer .buildozer
          buildozer -v android clean || true

      - name: Build APK with pip fix
        run: |
          # Клонируем p4a вручную и патчим до запуска buildozer
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          git clone -b develop --single-branch https://github.com/kivy/python-for-android.git
          cd python-for-android
          
          # Сильный патч
          sed -i "s|pip install -U pip|pip install pip==24.3.1 --no-deps --force-reinstall|g" pythonforandroid/build.py
          sed -i "s|'pip install -U pip'|'pip install pip==24.3.1 --no-deps --force-reinstall'|g" pythonforandroid/build.py
          
          echo "✅ p4a patched successfully"
          cd ../../../..

          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Learning-IDE-APK
          path: bin/*.apk
          if-no-files-found: warn