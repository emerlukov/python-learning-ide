name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          python3-dev \
          build-essential \
          git \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev \
          openjdk-17-jdk \
          zip \
          unzip

    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install cython buildozer

    - name: Debug - Check files
      run: |
        echo "=== Current directory ==="
        pwd
        echo "=== Files in root ==="
        ls -la
        echo "=== Checking main.py ==="
        if [ -f "main.py" ]; then
          echo "main.py EXISTS"
        else
          echo "ERROR: main.py NOT FOUND!"
          exit 1
        fi
        echo "=== Checking buildozer.spec ==="
        if [ -f "buildozer.spec" ]; then
          echo "buildozer.spec EXISTS"
        else
          echo "ERROR: buildozer.spec NOT FOUND!"
          exit 1
        fi

    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tee build.log

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: bin/*.apk
