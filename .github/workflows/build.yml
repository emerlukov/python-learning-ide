name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip python3-dev build-essential git autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev openjdk-17-jdk zip unzip

    - name: Install Python packages
      run: |
        pip install --upgrade pip setuptools wheel resolvelib
        pip install cython buildozer

    - name: Clean previous builds
      run: |
        rm -rf ~/.buildozer
        rm -rf .buildozer
        rm -rf bin/

    - name: Build APK
      env:
        ANDROID_NDK: ''
        ANDROID_NDK_HOME: ''
        ANDROID_NDK_ROOT: ''
        ANDROID_HOME: ''
        ANDROID_SDK_ROOT: ''
      run: |
        buildozer android debug 2>&1 | tee full_build.log
        echo "=== Searching for APK ==="
        find /home/runner -name "*.apk" 2>/dev/null

    - name: Upload full log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: full-build-log
        path: full_build.log

    - name: Upload APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          /home/runner/**/*.apk
          bin/*.apk