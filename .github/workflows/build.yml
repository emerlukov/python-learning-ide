name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer and dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer

      - name: Clean previous builds
        run: |
          rm -rf \~/.buildozer
          buildozer -v android clean || true

      - name: Patch python-for-android (fix pip error)
        run: |
          echo "Patching python-for-android..."
          # Патч будет работать после того, как buildozer скачает p4a
          P4A_DIR=$(python -c "import pythonforandroid; print(pythonforandroid.__path__[0])" 2>/dev/null || echo "")
          if [ -n "$P4A_DIR" ]; then
            sed -i "s|pip install -U pip|pip install pip==24.3.1 --no-deps|g" $P4A_DIR/build.py || true
            echo "Patched successfully"
          else
            echo "Will patch after p4a clone"
          fi

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Python-Learning-IDE-APK
          path: bin/*.apk
          if-no-files-found: error