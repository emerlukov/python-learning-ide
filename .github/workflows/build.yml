name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev libtinfo6 \
            cmake libffi-dev libssl-dev automake autopoint gettext libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36

      - name: Clean previous builds
        run: |
          rm -rf \~/.buildozer .buildozer
          buildozer -v android clean || true

      - name: Patch python-for-android (force old pip)
        run: |
          echo "Patching p4a to prevent pip upgrade..."
          # Patch after clone
          sed -i "s|pip install -U pip|pip install pip==24.3.1 --no-deps --force-reinstall|g" .buildozer/android/platform/python-for-android/pythonforandroid/build.py || true
          sed -i "s|pip install -U pip|pip install pip==24.3.1 --no-deps --force-reinstall|g" \~/.buildozer/android/platform/python-for-android/pythonforandroid/build.py || true

      - name: Build APK
        run: |
          buildozer -v android debug